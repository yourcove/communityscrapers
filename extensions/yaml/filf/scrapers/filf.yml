# Upstream file: scrapers/FILF.yml
name: "FILF"
sceneByURL:
  - action: scrapeXPath
    url:
      - filf.com/profil/
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    scene:
      Title: //h1[@class="title"]/text()
      Details: //p[@class="description"]/text()
      Performers:
        Name: //div[@class="name-ctn"]/span/text()
      Image: 
        selector: //img[@class="scene-img"]/@src
        postProcess:
            - replace:
                - regex: ^
                  with: "https:"
      Studio:
        Name: 
            fixed: FILF

