# Upstream file: scrapers/1passforallsites.yml
name: "1 Pass For All Sites"
sceneByURL:
  - action: scrapeXPath
    url:
      - 1passforallsites.com/episode/
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    scene:
      Studio:
        Name:
          selector: //a[contains(@href,'?site=')]
      Title:
        selector: //title
        postProcess:
          - replace:
              - regex: (^.+) - 1 .+$
                with: $1
      Details: //div[@class="sp-info-txt"]/p/text()
      Performers:
        Name:
          selector: //p[@class="sp-info-name"]/a/text()
      Tags:
        Name:
          selector: //p[@class="niches-list"]/a/text()
      Date:
        selector: //li[contains(text(),"Added:")]
        postProcess:
          - replace:
            - regex: "Added\\: (.+)"
              with: $1
          - parseDate: 2 Jan 2006
      Image: //video/@poster

