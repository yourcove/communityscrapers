# Upstream file: scrapers/MariskaX.yml
name: "MariskaX"
sceneByURL:
  - action: scrapeXPath
    url:
      - mariskax.com
    scraper: sceneScraper

performerByURL:
  - action: scrapeXPath
    url:
      - mariskax.com/model
    scraper: performerScraper

xPathScrapers:
  sceneScraper:
    common:
      $perf: //div[@class="content-meta"]/h4[@class="models"]/a
    scene:
      Title: //h1[@class="title"]
      Date:
        selector: //span[@class="post-date"]
        postProcess:
          - replace:
              - regex: (\d+)(st|nd|rd|th)
                with: "$1"
          - parseDate: 2 Jan 2006
      Image: //video[@id="ypp-player"]/@poster
      Studio:
        Name:
          fixed: MariskaX
      Performers:
        Name: $perf
        URLs: $perf/@href

  performerScraper:
    performer:
      Name: //h1[@class="model-name"]
      Image: //div[@class="model-photo"]/img/@data-src
