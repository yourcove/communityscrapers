# Upstream file: scrapers/DigitalDesire.yml
name: DigitalDesire.com
sceneByURL:
  - action: scrapeXPath
    url:
      - digitaldesire.com
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    scene:
      Title:
        selector: //meta[@property="og:title"]/@content
      Date:
        selector: //div[@class="set_date"]
        postProcess:
          - parseDate: January 2, 2006
      Performers:
        Name: //div[@class="title_bar gallery_model"]/span/a
      Tags:
        Name: //span[@class="update_tags"]/a
      Image:
        selector: //meta[@property="og:image"]/@content
        postProcess:
          - replace:
              - regex: "-2x"
                with: "-1x"
      Studio:
        Name:
          fixed: DigitalDesire
