# Upstream file: scrapers/Catalina Cruz.yml
name: CatalinaCruz
sceneByURL:
  - action: scrapeXPath
    url:
      - catalinacruz.com
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    scene:
      Title:
        selector: //span[@class="title-links"]/strong
      Performers:
        Name: //p[@class='featuring']/a
      Details: //span[@class='reg-text3']
      Tags:
        Name: //p[@class='category']/a
      Image:
        selector: //div[@id="endscreen"]/@style
        postProcess:
          - replace:
              - regex: .*?(https?:\/\/\S*\.jpg).*
                with: $1
      Studio:
        Name:
          fixed: CatalinaCruz
